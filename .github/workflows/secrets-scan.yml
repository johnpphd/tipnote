name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for leaked credentials..."
          FOUND=0

          # Firebase project IDs (add your project ID pattern here)
          if grep -r --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            -E "AIzaSy[a-zA-Z0-9_-]{33}" src/ functions/src/ vite.config.ts 2>/dev/null; then
            echo "::error::Found Firebase API key in source"
            FOUND=1
          fi

          # Generic secret patterns
          if grep -r --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(password|secret|token|api_key)\s*[:=]\s*['\"][^'\"]{8,}" src/ functions/src/ 2>/dev/null | \
            grep -v "process\.env\." | grep -v "\.example" | grep -v "// " | grep -v "node_modules"; then
            echo "::error::Possible hardcoded secret found"
            FOUND=1
          fi

          # .env files that shouldn't be committed
          for f in .env .env.local .env.production .env.keys .env.op; do
            if [ -f "$f" ]; then
              echo "::error::$f should not be committed"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi

          echo "No secrets found."
